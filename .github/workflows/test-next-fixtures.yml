name: test-next-fixtures

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  default:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        next: [16, 15, 14, 13]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - &override_catalog
        name: Override catalog for Next.js ${{ matrix.next }}
        if: matrix.next != '16'
        run: |
          yq -i '.catalog.next = "^${{ matrix.next }}"' pnpm-workspace.yaml
          yq -i '.catalog.react = "*"' pnpm-workspace.yaml
          yq -i '.catalog["react-dom"] = "*"' pnpm-workspace.yaml
          yq -i '.catalog["@types/react"] = "*"' pnpm-workspace.yaml
          yq -i '.catalog["@types/react-dom"] = "*"' pnpm-workspace.yaml
          yq -i '.catalog["eslint-config-next"] = "^${{ matrix.next }}"' pnpm-workspace.yaml

      - &remove_webpack
        name: Remove --webpack flag for next build
        if: matrix.next == '13' || matrix.next == '14' || matrix.next == '15'
        run: |
          for f in tests/*/package.json; do
            jq '.scripts.build = "next build"' $f > /tmp/pkg.json && mv /tmp/pkg.json $f
          done

      - &install
        name: Install deps and build library
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Build fixture
        run: pnpm --dir tests/default build

      - name: Start fixture server and validate output
        working-directory: tests/default
        run: node run_validation.mjs

  standalone:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        next: [16, 15, 14, 13]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - *override_catalog
      - *remove_webpack
      - *install

      - name: Build fixture
        run: pnpm --dir tests/standalone build

      - name: Copy standalone output and start server
        working-directory: tests/standalone
        run: node run_validation.mjs

  export:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        next: [16, 15, 14, 13]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - *override_catalog
      - *remove_webpack
      - *install

      - name: Build export fixture
        run: pnpm --dir tests/export build

      - name: Validate exported HTML
        working-directory: tests/export
        run: node run_validation.mjs
